<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">FarmPro 黒毛和牛</title>
  <desc id="desc">緑の背景に正面を向いた黒毛和牛の顔</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#55b632"/>
      <stop offset="1" stop-color="#31951f"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#292622"/>
      <stop offset="1" stop-color="#100f0e"/>
    </linearGradient>
    <linearGradient id="muzzle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a4540"/>
      <stop offset="1" stop-color="#201e1b"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4ddb0"/>
      <stop offset="1" stop-color="#a77a3d"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 小さな角 -->
  <path d="M173 145c-28-13-43-41-35-75 24 14 42 35 52 62Z" fill="url(#horn)" stroke="#6e522e" stroke-width="7" stroke-linejoin="round"/>
  <path d="M339 145c28-13 43-41 35-75-24 14-42 35-52 62Z" fill="url(#horn)" stroke="#6e522e" stroke-width="7" stroke-linejoin="round"/>

  <!-- 牛らしい大きな耳 -->
  <path d="M166 160C113 116 49 128 34 183c-12 45 36 83 116 61Z" fill="#171513" stroke="#0b0a09" stroke-width="10"/>
  <path d="M346 160c53-44 117-32 132 23 12 45-36 83-116 61Z" fill="#171513" stroke="#0b0a09" stroke-width="10"/>
  <path d="M147 180c-37-24-76-19-91 12 25 23 57 28 94 16Z" fill="#3a3028" opacity=".8"/>
  <path d="M365 180c37-24 76-19 91 12-25 23-57 28-94 16Z" fill="#3a3028" opacity=".8"/>

  <!-- 正面向きの黒毛和牛の顔 -->
  <path d="M256 102c-91 0-145 61-137 176 6 92 44 161 137 161s131-69 137-161c8-115-46-176-137-176Z" fill="url(#face)" stroke="#0b0a09" stroke-width="10"/>
  <path d="M200 119c22-18 90-18 112 0-16-2-30 5-56 3-26 2-40-5-56-3Z" fill="#0c0b0a"/>

  <!-- 目 -->
  <ellipse cx="201" cy="239" rx="29" ry="35" fill="#090909" stroke="#4d4742" stroke-width="7"/>
  <ellipse cx="311" cy="239" rx="29" ry="35" fill="#090909" stroke="#4d4742" stroke-width="7"/>
  <circle cx="192" cy="226" r="8" fill="#fff"/>
  <circle cx="302" cy="226" r="8" fill="#fff"/>

  <!-- 幅広い鼻 -->
  <path d="M166 330c9-47 40-70 90-70s81 23 90 70c8 43-22 78-90 78s-98-35-90-78Z" fill="url(#muzzle)" stroke="#0b0a09" stroke-width="9"/>
  <ellipse cx="214" cy="335" rx="24" ry="31" fill="#080807"/>
  <ellipse cx="298" cy="335" rx="24" ry="31" fill="#080807"/>
  <path d="M211 385c28 11 62 11 90 0" fill="none" stroke="#0b0a09" stroke-width="10" stroke-linecap="round"/>

  <!-- 小さいサイズでも顔の輪郭が分かるハイライト -->
  <path d="M175 183c21-32 49-47 81-47" fill="none" stroke="#514a43" stroke-width="8" stroke-linecap="round" opacity=".45"/>
  <path d="M337 183c-21-32-49-47-81-47" fill="none" stroke="#514a43" stroke-width="8" stroke-linecap="round" opacity=".45"/>
</svg>
